<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="compassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="needleNorth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="needleSouth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f0f23" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" filter="url(#softShadow)"/>

  <!-- Subtle outer ring -->
  <circle cx="100" cy="100" r="88" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.3" fill="none"/>

  <!-- Compass rose outer ring -->
  <circle cx="100" cy="100" r="64" fill="none" stroke="url(#compassGrad)" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Compass rose tick marks -->
  <g stroke="#818cf8" stroke-width="1.2" stroke-opacity="0.6">
    <!-- Cardinal ticks -->
    <line x1="100" y1="38" x2="100" y2="46"/>
    <line x1="100" y1="154" x2="100" y2="162"/>
    <line x1="38" y1="100" x2="46" y2="100"/>
    <line x1="154" y1="100" x2="162" y2="100"/>
    <!-- Intercardinal ticks -->
    <line x1="145.3" y1="54.7" x2="140.0" y2="60.0"/>
    <line x1="54.7" y1="145.3" x2="60.0" y2="140.0"/>
    <line x1="54.7" y1="54.7" x2="60.0" y2="60.0"/>
    <line x1="145.3" y1="145.3" x2="140.0" y2="140.0"/>
  </g>

  <!-- Cardinal letters -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle" dominant-baseline="central">
    <text x="100" y="30" fill="#c084fc" filter="url(#glow)">N</text>
    <text x="100" y="172" fill="#a5b4fc">S</text>
    <text x="28" y="101" fill="#a5b4fc">W</text>
    <text x="172" y="101" fill="#a5b4fc">E</text>
  </g>

  <!-- Compass needle — north (purple, pointing up-right) -->
  <polygon
    points="100,48 105,100 100,96 95,100"
    fill="url(#needleNorth)"
    filter="url(#glow)"
    transform="rotate(-35 100 100)"
  />
  <!-- Compass needle — south (white/indigo) -->
  <polygon
    points="100,152 105,100 100,104 95,100"
    fill="url(#needleSouth)"
    opacity="0.75"
    transform="rotate(-35 100 100)"
  />

  <!-- Center cap -->
  <circle cx="100" cy="100" r="7" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <circle cx="100" cy="100" r="3.5" fill="#c084fc" filter="url(#glow)"/>

  <!-- Mortarboard cap above center — graduation icon -->
  <g transform="translate(100, 66)" filter="url(#glow)">
    <!-- Board -->
    <polygon points="0,-9 16,0 0,9 -16,0" fill="#f0abfc" opacity="0.95"/>
    <!-- Top -->
    <rect x="-5" y="-13" width="10" height="5" rx="1" fill="#c084fc"/>
    <!-- Tassel -->
    <line x1="16" y1="0" x2="16" y2="9" stroke="#f0abfc" stroke-width="1.5"/>
    <circle cx="16" cy="10" r="1.5" fill="#f0abfc"/>
  </g>
</svg>
